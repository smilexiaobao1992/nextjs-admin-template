name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: admin_template
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d admin_template"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/admin_template
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/admin_template
      BETTER_AUTH_SECRET: ci-only-secret-with-at-least-32-bytes
      BETTER_AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run db:verify
      - run: npm run check
      - run: npm run build
